name: Portal analytics refresh

on:
  schedule:
    # Runs daily at 10:30 UTC.
    - cron: "30 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/analytics-requirements.txt

      - name: Install dependencies
        run: |
          set -euo pipefail
          npm ci
          python -m pip install --upgrade pip
          python -m pip install -r scripts/analytics-requirements.txt

      - name: Prepare Google service account
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [ -n "${GOOGLE_SERVICE_ACCOUNT_JSON:-}" ]; then
            KEY_PATH="$RUNNER_TEMP/google-service-account.json"
            printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > "$KEY_PATH"
            echo "GOOGLE_SERVICE_ACCOUNT_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
          fi

      - name: Pull external analytics sources
        id: sources
        env:
          MAILCHIMP_API_KEY: ${{ secrets.MAILCHIMP_API_KEY }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID: ${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          META_APP_ID: ${{ secrets.META_APP_ID }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
          EVENTBRITE_API_TOKEN: ${{ secrets.EVENTBRITE_API_TOKEN }}
          SQUARESPACE_API_KEY: ${{ secrets.SQUARESPACE_API_KEY }}
        run: |
          set -euo pipefail
          npm run analytics:refresh-sources

          SOURCE_STATUS=$(jq -r '.status' data/analytics-source-status.json)
          SOURCE_SUMMARY=$(jq -r '[.sources[] | "\(.label): \(.status)"] | join("; ")' data/analytics-source-status.json)
          HAS_SUCCESS=$(jq -r 'any(.sources[]; .status == "success")' data/analytics-source-status.json)
          {
            echo "status=$SOURCE_STATUS"
            echo "has_success=$HAS_SUCCESS"
            echo "summary=$SOURCE_SUMMARY"
            echo "sources<<EOF_SOURCES"
            jq -c '.sources' data/analytics-source-status.json
            echo "EOF_SOURCES"
          } >> "$GITHUB_OUTPUT"

      - name: Upload private analytics source details
        id: source_details
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          npm run analytics:upload-source-details

          {
            echo "summary<<EOF_DETAILS"
            jq -c '.' data/analytics-source-detail-upload.json
            echo "EOF_DETAILS"
          } >> "$GITHUB_OUTPUT"

      - name: Build portal analytics snapshot
        if: steps.sources.outputs.has_success == 'true'
        run: npm run analytics:build-snapshot -- .

      - name: Commit refreshed analytics snapshot
        id: commit_snapshot
        if: steps.sources.outputs.has_success == 'true'
        run: |
          set -euo pipefail
          if git diff --quiet -- src/lib/admin/analytics/legacy-snapshot.json; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No analytics snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/admin/analytics/legacy-snapshot.json
          git commit -m "Refresh portal analytics snapshot"
          git push
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger portal analytics maintenance
        id: refresh
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          REFRESH_SECRET: ${{ secrets.PORTAL_ANALYTICS_MAINTENANCE_SECRET || secrets.CONTENT_SYNC_SECRET }}
          EXTERNAL_SOURCES: ${{ steps.sources.outputs.sources }}
        run: |
          set -euo pipefail

          SITE_URL="${SITE_URL%/}"
          if [ -z "$SITE_URL" ]; then
            echo "SITE_URL secret is not set."
            exit 1
          fi
          if [ -z "$REFRESH_SECRET" ]; then
            echo "Set PORTAL_ANALYTICS_MAINTENANCE_SECRET or CONTENT_SYNC_SECRET in GitHub secrets."
            exit 1
          fi

          REQUEST_BODY=$(jq -n \
            --arg trigger "github_actions" \
            --argjson externalSources "${EXTERNAL_SOURCES:-[]}" \
            '{ trigger: $trigger, externalSources: $externalSources }')

          set +e
          RESPONSE=$(curl -sS -w "\n__HTTP_STATUS__%{http_code}" -X POST "${SITE_URL}/.netlify/functions/portal-analytics-maintenance" \
            -H "x-portal-analytics-maintenance-secret: ${REFRESH_SECRET}" \
            -H "x-portal-analytics-trigger: github_actions" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY")
          CURL_EXIT=$?
          set -e

          if [ "$CURL_EXIT" -ne 0 ]; then
            HTTP_STATUS="000"
            BODY="curl exited with status ${CURL_EXIT}"
          else
            HTTP_STATUS=$(echo "$RESPONSE" | grep -o '__HTTP_STATUS__[0-9]*' | grep -o '[0-9]*')
            BODY=$(echo "$RESPONSE" | sed 's/__HTTP_STATUS__[0-9]*//')
          fi

          {
            echo "http_status=$HTTP_STATUS"
            echo "body<<EOF_BODY"
            echo "$BODY"
            echo "EOF_BODY"
            echo "status=$(echo "$BODY" | jq -r '.result.status // "failed"' 2>/dev/null || echo "failed")"
          } >> "$GITHUB_OUTPUT"

          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $BODY"

          if [ "$HTTP_STATUS" != "200" ]; then
            exit 1
          fi

      - name: Send Slack notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SOURCE_STATUS: ${{ steps.sources.outputs.status }}
          SOURCE_SUMMARY: ${{ steps.sources.outputs.summary }}
          DETAIL_SUMMARY: ${{ steps.source_details.outputs.summary }}
          REFRESH_OUTCOME: ${{ steps.refresh.outcome }}
          REFRESH_STATUS: ${{ steps.refresh.outputs.status }}
          HTTP_STATUS: ${{ steps.refresh.outputs.http_status }}
          RESPONSE_BODY: ${{ steps.refresh.outputs.body }}
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set."
            exit 1
          fi

          FINISHED_AT=$(date -u +"%Y-%m-%d %H:%M UTC")
          if [ "$REFRESH_OUTCOME" != "success" ]; then
            TITLE="IPN Member Portal analytics refresh failed"
            STATUS_TEXT="failed"
          elif [ "${REFRESH_STATUS:-}" = "partial_failure" ] || [ "${SOURCE_STATUS:-}" = "partial_failure" ]; then
            TITLE="IPN Member Portal analytics refresh completed with source failures"
            STATUS_TEXT="partial_failure"
          else
            TITLE="IPN Member Portal analytics refresh completed"
            STATUS_TEXT="success"
          fi

          SUMMARY=$(echo "${RESPONSE_BODY:-}" | jq -r '
            if .result then
              "Rollups: \(.result.rollups // 0), deleted raw events: \(.result.deletedRawEvents // 0), sources checked: \((.result.sources // []) | length)"
            elif .error then
              .error
            else
              "No JSON response body."
            end
          ' 2>/dev/null || echo "${RESPONSE_BODY:-No response body.}")

          SOURCES_TEXT=$(echo "${RESPONSE_BODY:-}" | jq -r '
            if .result.sources then
              [.result.sources[] | "• \(.label): \(.status)" + (if .note then " — " + (.note | tostring | gsub("\\n"; " ") | .[0:120]) else "" end)] | join("\n")
            else
              env.SOURCE_SUMMARY // "No source status available."
            end
          ' 2>/dev/null || echo "${SOURCE_SUMMARY:-No source status available.}")

          DETAIL_TEXT=$(echo "${DETAIL_SUMMARY:-}" | jq -r '
            if .upserted != null then
              "Private detail rows upserted: \(.upserted) (" + ((.bySource // {}) | to_entries | map("\(.key): \(.value)") | join(", ")) + ")"
            else
              "Private detail row upload did not run."
            end
          ' 2>/dev/null || echo "Private detail row upload did not run.")

          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg status "$STATUS_TEXT" \
            --arg finished_at "$FINISHED_AT" \
            --arg http_status "${HTTP_STATUS:-unknown}" \
            --arg summary "$SUMMARY" \
            --arg sources "$SOURCES_TEXT" \
            --arg details "$DETAIL_TEXT" \
            --arg workflow_url "$WORKFLOW_URL" \
            '{
              blocks: [
                { type: "header", text: { type: "plain_text", text: $title, emoji: true } },
                {
                  type: "section",
                  fields: [
                    { type: "mrkdwn", text: ("*Status:*\n" + $status) },
                    { type: "mrkdwn", text: ("*Finished:*\n" + $finished_at) },
                    { type: "mrkdwn", text: ("*HTTP:*\n" + $http_status) },
                    { type: "mrkdwn", text: ("*Summary:*\n" + $summary) }
                  ]
                },
                { type: "section", text: { type: "mrkdwn", text: ("*Sources:*\n" + $sources) } },
                { type: "section", text: { type: "mrkdwn", text: ("*Private detail upload:*\n" + $details) } },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "View Workflow Run" },
                      url: $workflow_url
                    }
                  ]
                }
              ]
            }')

          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "$PAYLOAD"

      - name: Fail on source errors
        if: always()
        env:
          SOURCE_STATUS: ${{ steps.sources.outputs.status }}
          REFRESH_STATUS: ${{ steps.refresh.outputs.status }}
          REFRESH_OUTCOME: ${{ steps.refresh.outcome }}
        run: |
          set -euo pipefail
          if [ "${REFRESH_OUTCOME:-failure}" != "success" ]; then
            exit 1
          fi
          if [ "${SOURCE_STATUS:-}" = "partial_failure" ] || [ "${REFRESH_STATUS:-}" = "partial_failure" ] || [ "${REFRESH_STATUS:-}" = "failed" ]; then
            exit 1
          fi
